<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Health Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#050d1a;min-height:100vh;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#050d1a;}
    ::-webkit-scrollbar-thumb{background:#1e293b;border-radius:4px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const SHEET_ID = "1nm2vKsitoSkz34EPx0Gw8JzaQw9K7hYv9uvdHunyieE";

async function fetchSheetData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("fetch failed");
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(",").map(c => c.replace(/^"|"$/g, "").trim());
    const date = cols[0];
    const weight = parseFloat(cols[1]) || null;
    const calBreakfast = parseFloat(cols[3]) || 0;
    const protBreakfast = parseFloat(cols[4]) || 0;
    const calLunch = parseFloat(cols[6]) || 0;
    const protLunch = parseFloat(cols[7]) || 0;
    const calDinner = parseFloat(cols[9]) || 0;
    const protDinner = parseFloat(cols[10]) || 0;
    const totalCal = parseFloat(cols[11]) || (calBreakfast + calLunch + calDinner) || null;
    const deficit = parseFloat(cols[12]) || null;
    const totalProt = parseFloat(cols[13]) || (protBreakfast + protLunch + protDinner) || null;
    const burned = parseFloat(cols[14]) || null;
    const remark = cols[15] || "";
    if (date && (weight || totalCal || totalProt)) {
      rows.push({ date, weight, calBreakfast, calLunch, calDinner, totalCal, deficit, totalProt, burned, remark });
    }
  }
  return rows;
}

function MiniChart({ data, color="#4ade80", height=48 }) {
  const vals = (data||[]).filter(v => v !== null);
  if (vals.length < 2) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"#334155",fontSize:11}}>รอข้อมูล...</div>;
  const min = Math.min(...vals), max = Math.max(...vals);
  const w=240, h=height, pad={l:4,r:4,t:4,b:4};
  const xS = i => pad.l + (i/(vals.length-1))*(w-pad.l-pad.r);
  const yS = v => pad.t + (h-pad.t-pad.b) - ((v-min)/(max-min+0.001))*(h-pad.t-pad.b);
  const pts = vals.map((v,i)=>`${xS(i)},${yS(v)}`).join(" ");
  const area = [`${xS(0)},${h}`,...vals.map((v,i)=>`${xS(i)},${yS(v)}`),`${xS(vals.length-1)},${h}`].join(" ");
  const gid = `g${color.replace("#","")}`;
  return (
    <svg width="100%" viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none" style={{display:"block"}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={area} fill={`url(#${gid})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={xS(vals.length-1)} cy={yS(vals[vals.length-1])} r="3" fill={color}/>
    </svg>
  );
}

function ProgressRing({ pct, size=88, stroke=8, color="#4ade80", label, value }) {
  const r = (size-stroke)/2, circ = 2*Math.PI*r;
  const dash = (Math.min(pct,100)/100)*circ;
  return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            transform={`rotate(-90 ${size/2} ${size/2})`}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:"#f1f5f9",lineHeight:1}}>{value}</span>
        </div>
      </div>
      <div style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",textAlign:"center",letterSpacing:"1px",textTransform:"uppercase",whiteSpace:"pre-line"}}>{label}</div>
    </div>
  );
}

function App() {
  const [data, setData] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const [lastRefresh, setLastRefresh] = React.useState(null);

  async function load() {
    setLoading(true); setError(null);
    try {
      const rows = await fetchSheetData();
      setData(rows);
      setLastRefresh(new Date().toLocaleTimeString("th-TH"));
    } catch(e) {
      setError("โหลดข้อมูลไม่ได้ — ตรวจสอบว่า Sheet เปิด Share เป็น Anyone with link แล้ว");
    }
    setLoading(false);
  }

  React.useEffect(() => { load(); }, []);

  const withWeight = data.filter(r=>r.weight);
  const withCal = data.filter(r=>r.totalCal);
  const withProt = data.filter(r=>r.totalProt);
  const withDeficit = data.filter(r=>r.deficit);

  const latestWeight = withWeight.length ? withWeight[withWeight.length-1].weight : null;
  const firstWeight = withWeight.length ? withWeight[0].weight : 84;
  const weightChange = latestWeight ? Math.round((latestWeight-firstWeight)*10)/10 : null;
  const targetWeight = 77, startWeight = 84;
  const weightProgress = latestWeight ? Math.round(((startWeight-latestWeight)/(startWeight-targetWeight))*100) : 0;

  const avgCal = withCal.length ? Math.round(withCal.reduce((s,r)=>s+r.totalCal,0)/withCal.length) : null;
  const avgProt = withProt.length ? Math.round(withProt.reduce((s,r)=>s+r.totalProt,0)/withProt.length) : null;
  const avgDeficit = withDeficit.length ? Math.round(withDeficit.reduce((s,r)=>s+r.deficit,0)/withDeficit.length) : null;

  const targetCal=1800, targetProt=120;
  const calPct = avgCal ? Math.min(Math.round((avgCal/targetCal)*100),100) : 0;
  const protPct = avgProt ? Math.min(Math.round((avgProt/targetProt)*100),100) : 0;

  const weightSeries = withWeight.map(r=>r.weight);
  const calSeries = withCal.map(r=>r.totalCal);
  const protSeries = withProt.map(r=>r.totalProt);

  const mealAvg = {
    breakfast: withCal.length ? Math.round(withCal.reduce((s,r)=>s+r.calBreakfast,0)/withCal.length) : 0,
    lunch: withCal.length ? Math.round(withCal.reduce((s,r)=>s+r.calLunch,0)/withCal.length) : 0,
    dinner: withCal.length ? Math.round(withCal.reduce((s,r)=>s+r.calDinner,0)/withCal.length) : 0,
  };
  const mealTotal = mealAvg.breakfast+mealAvg.lunch+mealAvg.dinner || 1;

  const s = {
    dash:{minHeight:"100vh",background:"#050d1a",backgroundImage:"radial-gradient(ellipse 80% 40% at 50% -5%,rgba(74,222,128,0.07) 0%,transparent 60%)",color:"#e2e8f0",fontFamily:"'DM Mono',monospace",padding:"24px 16px 48px",display:"flex",flexDirection:"column",alignItems:"center",gap:16},
    w:{width:"100%",maxWidth:420},
    header:{width:"100%",maxWidth:420,display:"flex",justifyContent:"space-between",alignItems:"flex-end"},
    card:{background:"#0a1628",border:"1px solid #1e293b",borderRadius:16,padding:"16px 18px"},
    secLabel:{fontSize:10,color:"#334155",letterSpacing:"2px",textTransform:"uppercase",marginBottom:8,paddingLeft:2,fontFamily:"'DM Mono',monospace"},
    refreshBtn:{background:"none",border:"1px solid #1e293b",color:"#475569",borderRadius:8,fontFamily:"'DM Mono',monospace",fontSize:10,padding:"6px 10px",cursor:"pointer"},
  };

  return (
    <div style={s.dash}>
      {/* Header */}
      <div style={s.header}>
        <div>
          <div style={{fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:"#f8fafc",lineHeight:1}}>HEALTH<span style={{color:"#4ade80"}}>.</span>DASH</div>
          <div style={{fontSize:10,color:"#334155",letterSpacing:"2px",textTransform:"uppercase",marginTop:4}}>sync จาก Google Sheet</div>
        </div>
        <button style={s.refreshBtn} onClick={load} disabled={loading}>{loading ? "⟳ โหลด..." : "🔄 รีเฟรช"}</button>
      </div>

      {error && (
        <div style={{...s.w,background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:12,padding:"12px 16px",fontSize:12,color:"#f87171",lineHeight:1.8}}>
          ⚠️ {error}
        </div>
      )}

      {/* Weight hero */}
      <div style={s.w}>
        <div style={s.secLabel}>น้ำหนักปัจจุบัน</div>
        <div style={{...s.card,background:"linear-gradient(135deg,#0a1628,#0d1f35)",borderRadius:20,display:"flex",flexDirection:"column",gap:14}}>
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontSize:52,fontWeight:800,color:"#f8fafc",lineHeight:1}}>
                {latestWeight||"—"}<span style={{fontSize:20,color:"#475569"}}> kg</span>
              </div>
              <div style={{fontSize:11,color:"#334155",marginTop:4}}>{withWeight.length>0?`บันทึกแล้ว ${withWeight.length} วัน`:"ยังไม่มีข้อมูล"}</div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
              {weightChange!==null&&(
                <span style={{fontSize:11,padding:"4px 10px",borderRadius:20,background:weightChange<0?"rgba(74,222,128,0.12)":"rgba(248,113,113,0.12)",color:weightChange<0?"#4ade80":"#f87171",border:`1px solid ${weightChange<0?"rgba(74,222,128,0.2)":"rgba(248,113,113,0.2)"}`}}>
                  {weightChange<0?"▼":"▲"} {Math.abs(weightChange)} kg
                </span>
              )}
              <span style={{fontSize:9,padding:"2px 7px",borderRadius:10,background:"#0f172a",border:"1px solid #1e293b",color:"#475569"}}>เป้า {targetWeight} kg</span>
            </div>
          </div>
          <div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#475569",marginBottom:6}}>
              <span>ความคืบหน้า</span>
              <span style={{color:weightProgress>0?"#4ade80":"#334155"}}>{Math.max(0,weightProgress)}%</span>
            </div>
            <div style={{height:6,background:"#1e293b",borderRadius:4,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.max(0,weightProgress)}%`,background:"linear-gradient(90deg,#4ade80,#a3e635)",borderRadius:4,transition:"width 0.8s ease"}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#334155",marginTop:4}}>
              <span>เริ่ม {startWeight} kg</span><span>เป้า {targetWeight} kg</span>
            </div>
          </div>
          {weightSeries.length>=2&&(
            <div>
              <div style={{fontSize:10,color:"#334155",letterSpacing:"1px",textTransform:"uppercase",marginBottom:6}}>Trend</div>
              <MiniChart data={weightSeries} color="#4ade80" height={52}/>
            </div>
          )}
        </div>
      </div>

      {/* Rings */}
      {(avgCal||avgProt)&&(
        <div style={s.w}>
          <div style={s.secLabel}>เฉลี่ยต่อวัน</div>
          <div style={s.card}>
            <div style={{display:"flex",justifyContent:"space-around",padding:"16px 0 8px"}}>
              <ProgressRing pct={calPct} color="#f59e0b" label={`Cal เฉลี่ย\nเป้า ${targetCal}`} value={avgCal||"—"}/>
              <ProgressRing pct={protPct} color="#38bdf8" label={`Protein\nเป้า ${targetProt}g`} value={avgProt?`${avgProt}g`:"—"}/>
              {avgDeficit!==null&&<ProgressRing pct={Math.min(Math.abs(avgDeficit)/500*100,100)} color="#a78bfa" label={`Deficit\nเฉลี่ย`} value={avgDeficit}/>}
            </div>
            <div style={{display:"flex",gap:14,justifyContent:"center",marginTop:8}}>
              {[["#f59e0b","Calories"],["#38bdf8","Protein"],["#a78bfa","Deficit"]].map(([c,l])=>(
                <div key={l} style={{fontSize:10,color:"#475569",display:"flex",alignItems:"center",gap:5}}>
                  <span style={{width:8,height:8,borderRadius:2,background:c,display:"inline-block"}}/>{l}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Meal breakdown */}
      {mealTotal>1&&(
        <div style={s.w}>
          <div style={s.secLabel}>Calories แต่ละมื้อ (เฉลี่ย)</div>
          <div style={s.card}>
            {[["🌅 เช้า",mealAvg.breakfast,"#fbbf24"],["☀️ เที่ยง",mealAvg.lunch,"#4ade80"],["🌙 เย็น",mealAvg.dinner,"#38bdf8"]].map(([label,val,color])=>(
              <div key={label} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{fontSize:11,color:"#64748b",width:64,flexShrink:0}}>{label}</div>
                <div style={{flex:1,height:8,background:"#1e293b",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(val/mealTotal)*100}%`,background:color,borderRadius:4}}/>
                </div>
                <div style={{fontSize:11,color:"#94a3b8",width:52,textAlign:"right",flexShrink:0}}>{val} cal</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Cal + Prot trend */}
      {calSeries.length>=2&&(
        <div style={s.w}>
          <div style={s.secLabel}>Trend Calories & Protein</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[["Total Cal",calSeries,"#f59e0b"],[protSeries.length>=2?"Protein":null,protSeries,"#38bdf8"]].filter(([l])=>l).map(([label,series,color])=>(
              <div key={label} style={{...s.card,padding:"14px 14px 10px"}}>
                <div style={{fontSize:10,color:"#475569",letterSpacing:"1px",textTransform:"uppercase",marginBottom:8}}>{label}</div>
                <MiniChart data={series} color={color} height={52}/>
                <div style={{fontSize:10,color:"#64748b",marginTop:6}}>{series[series.length-1]}{label==="Protein"?"g":""} วันล่าสุด</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Log table */}
      <div style={s.w}>
        <div style={s.secLabel}>บันทึกล่าสุด</div>
        <div style={{...s.card,padding:"14px 0",overflowX:"auto"}}>
          {data.length===0?(
            <div style={{textAlign:"center",padding:"32px 16px",color:"#334155",fontSize:12,lineHeight:2}}>
              {loading?"⟳ กำลังโหลด...":(
                <>ยังไม่มีข้อมูล<br/><span style={{color:"#475569",fontSize:11}}>กรอกข้อมูลใน Sheet แล้วกดรีเฟรช</span></>
              )}
            </div>
          ):(
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr>{["วันที่","น้ำหนัก","Cal","Protein","Deficit"].map(h=>(
                  <th key={h} style={{fontSize:9,color:"#334155",textTransform:"uppercase",letterSpacing:"1px",padding:"6px 8px",textAlign:"left",borderBottom:"1px solid #1e293b",fontFamily:"'DM Mono',monospace"}}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {[...data].reverse().slice(0,10).map((r,i)=>(
                  <tr key={i}>
                    <td style={{fontSize:12,color:"#94a3b8",padding:"8px 8px",borderBottom:"1px solid #0f172a"}}>{r.date}</td>
                    <td style={{fontSize:12,color:"#e2e8f0",fontWeight:500,padding:"8px 8px",borderBottom:"1px solid #0f172a"}}>{r.weight?`${r.weight} kg`:"—"}</td>
                    <td style={{fontSize:12,color:r.totalCal?(r.totalCal<=targetCal?"#4ade80":"#f87171"):"#475569",padding:"8px 8px",borderBottom:"1px solid #0f172a"}}>{r.totalCal||"—"}</td>
                    <td style={{fontSize:12,color:r.totalProt?(r.totalProt>=targetProt?"#4ade80":"#94a3b8"):"#475569",padding:"8px 8px",borderBottom:"1px solid #0f172a"}}>{r.totalProt?`${r.totalProt}g`:"—"}</td>
                    <td style={{fontSize:12,color:r.deficit?(r.deficit>0?"#4ade80":"#f87171"):"#475569",padding:"8px 8px",borderBottom:"1px solid #0f172a"}}>{r.deficit||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>

      <div style={{fontSize:10,color:"#1e293b",textAlign:"center"}}>
        {lastRefresh?`อัปเดตล่าสุด ${lastRefresh} · `:""}<a href={`https://docs.google.com/spreadsheets/d/${SHEET_ID}`} target="_blank" style={{color:"#1e293b"}}>เปิด Sheet ↗</a>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
